# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
early_access: true

reviews:
  review_details: true
  high_level_summary: true
  review_status: true
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    custom:
      - name: "cleanup stale imports"
        enabled: true
        instructions: |
          Remove unused imports and obvious dead code when it is safe to do so.
          Do not change behavior, public interfaces, or runtime semantics.
      - name: "tighten python typing"
        enabled: true
        instructions: |
          Review the changed Python files and improve type precision where it is
          obviously safe to do so. Prefer adding or tightening return annotations,
          local variable annotations, and Optional or union handling without
          changing runtime behavior or public API contracts.
      - name: "polish logging calls"
        enabled: true
        instructions: |
          Review logging statements in the changed Python files and improve them
          when it is safe to do so. Prefer structured, lazy logging patterns,
          clearer context fields, and consistent exception logging without
          changing application behavior.
  pre_merge_checks:
    title:
      mode: warning
    description:
      mode: warning
    issue_assessment:
      mode: warning
    custom_checks:
      - name: "Security Scan"
        mode: warning
        instructions: |
          Check for obvious security issues and unsafe patterns in the changed code.
          Flag hardcoded secrets, unsafe deserialization, command injection,
          path traversal, SSRF, SQL injection, and auth or permission gaps when applicable.

knowledge_base:
  mcp:
    usage: enabled

issue_enrichment:
  planning:
    enabled: true
